name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        shell: bash
        run: |
          cd build
          if [ -f test_sgn ]; then
            ./test_sgn
          elif [ -f Release/test_sgn.exe ]; then
            ./Release/test_sgn.exe
          elif [ -f test_sgn.exe ]; then
            ./test_sgn.exe
          else
            echo "ERROR: test_sgn executable not found"
            exit 1
          fi
